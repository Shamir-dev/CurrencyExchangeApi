<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel = "stylesheet" href = "https://www.flaticon.com/free-icon-font/globe_3917527?term=globe&related_id=3917527">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">   
        <div id="date"> </div>
            <div class="header">
           <h2>Currency Converter</h2>
         <div class="right-controls">
          <!-- Globe Icon -->
         <i class="fa-solid fa-globe"></i>

          <!-- Toggle Switch -->
          <label class="switch">
           <input type="checkbox" id="toggle" />
            <span class="slider"></span>
            </label>
          </div>
          </div>

        <form>
            <div class="inputs-row">
                <div class="amount">
                    <p>Enter Amount Only</p>
                    <input type="text" id="amount" placeholder="1">
                </div>
                <div class="value">
                    <p>Converted Amount</p>
                    <input type="text" id="convertedAmount" placeholder="15000" readonly>
                </div>
            </div>

            <div class="dropdown">
                <div class="from">
                    <p>From</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/US/flat/64.png" alt="USD Flag">
                        <select name="from">
                            <option value="USD">USD</option>
                        </select>
                    </div>
                </div>

                <div class="swap-icon">
                    <i class="fa-solid fa-arrow-right-arrow-left"></i>
                </div>

                <div class="to"> 
                    <p>To</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/NP/flat/64.png" alt="NPR Flag">
                        <select name="to">
                            <option value="NPR">NPR</option>
                        </select>
                    </div>
                </div>
            </div> 

            <div class="msg">1 USD = 150 NPR</div>
            <button type="submit">Get Exchange Rate</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
